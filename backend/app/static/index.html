<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat inteligente con roles</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Chat inteligente con roles</h1>
      <p class="subtitle">MVP local (FastAPI + SQLite + Ollama)</p>

      <section class="controls">
        <label for="roleSelect">Rol</label>
        <select id="roleSelect"></select>
      </section>

      <section id="chatBox" class="chat-box" aria-live="polite"></section>

      <form id="chatForm" class="chat-form">
        <input id="messageInput" type="text" placeholder="Escribí tu mensaje..." autocomplete="off" required />
        <button type="submit">Enviar</button>
      </form>

      <p id="errorBox" class="error" hidden></p>
    </main>

    <script src="/app.js" defer></script>
  </body>
  </html>
